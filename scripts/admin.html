<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prompt Gallery — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f2f0ed;
  --card: #fff;
  --accent: #e60023;
  --text-primary: #111;
  --text-secondary: #767676;
  --border: #e5e5e5;
  --topbar-h: 52px;
}

html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

/* ── Top bar ─────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: #111; height: var(--topbar-h);
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; border-bottom: 1px solid #2a2a2a;
}
.brand { display: flex; align-items: center; gap: 7px; flex-shrink: 0; margin-right: 4px; }
.brand-logo {
  width: 26px; height: 26px; background: var(--accent);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
}
.brand-name { font-size: 14px; font-weight: 700; color: #fff; }
.brand-sub  { font-size: 11px; color: #666; }
.admin-pill {
  font-size: 10px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; background: #333;
  color: #aaa; padding: 2px 6px; border-radius: 4px;
}
#search-wrap { position: relative; flex: 1; max-width: 340px; }
#search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #555; pointer-events: none; }
#search {
  width: 100%; background: #1c1c1c; border: 1px solid #333; color: #ddd;
  border-radius: 18px; padding: 6px 12px 6px 32px; font-size: 13px; outline: none;
}
#search::placeholder { color: #555; }
#search:focus { border-color: #555; }
.tb-select {
  background: #1c1c1c; border: 1px solid #333; color: #bbb;
  border-radius: 14px; padding: 5px 10px; font-size: 12px;
  cursor: pointer; outline: none; flex-shrink: 0;
}
#count-label { font-size: 12px; color: #555; white-space: nowrap; flex-shrink: 0; }
.spacer { flex: 1; }
.dirty-dot {
  width: 7px; height: 7px; background: #fbbf24;
  border-radius: 50%; flex-shrink: 0; display: none;
}
.dirty-dot.on { display: block; }
.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 16px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .15s; flex-shrink: 0; white-space: nowrap;
}
.tb-btn:hover { opacity: .85; }
.tb-btn:disabled { opacity: .35; cursor: not-allowed; }
.btn-add  { background: #555; color: #fff; }
.btn-save { background: #16a34a; color: #fff; }
.btn-bulk { background: #1f2937; color: #fff; }

/* Deploy button */
.btn-deploy-cf {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 16px; border-radius: 16px;
  border: none; background: #2563eb; color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .15s; white-space: nowrap; flex-shrink: 0;
}
.btn-deploy-cf:hover { opacity: .85; }
.btn-deploy-cf:disabled { opacity: .35; cursor: not-allowed; }

/* ── List grid ──────────────────────────────────────── */
#main { max-width: 1400px; margin: 0 auto; padding: 10px 14px 120px; }
.masonry { display: flex; flex-direction: column; gap: 8px; }
.mitem { width: 100%; }

/* ── Card — horizontal list row ─────────────────────── */
.card {
  background: var(--card); border-radius: 12px;
  overflow: hidden; position: relative;
  display: flex; flex-direction: row;
  transition: box-shadow .15s;
}
.card:hover { box-shadow: 0 2px 16px rgba(0,0,0,.11); }
.card.selected {
  outline: 2px solid #111;
  box-shadow: 0 2px 16px rgba(0,0,0,.14);
}

.card-select {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  width: 24px; height: 24px; border-radius: 7px;
  background: rgba(255,255,255,.96); border: 1px solid rgba(0,0,0,.14);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
.card-select input {
  width: 15px; height: 15px; accent-color: #111; cursor: pointer;
}

/* Image column */
.card-img-wrap {
  width: 160px; min-width: 160px; flex-shrink: 0;
  position: relative; background: #eee; overflow: hidden;
  align-self: stretch;
}
.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.card-img-wrap .card-no-img {
  width: 100%; height: 100%; min-height: 100px;
  display: flex; align-items: center; justify-content: center;
  color: #bbb; font-size: 11px;
}

/* Modified/new indicator badge on image */
.card-badge {
  position: absolute; top: 7px; left: 7px;
  width: 20px; height: 20px; border-radius: 50%;
  font-size: 11px; font-weight: 700; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.card-badge.mod { background: #fbbf24; color: #111; }
.card-badge.new { background: #2563eb; color: #fff; }

/* Content column */
.card-body {
  flex: 1; min-width: 0; padding: 10px 13px 10px;
  display: flex; flex-direction: column; gap: 6px;
}

/* Top row: meta + stats + action buttons */
.card-top {
  display: flex; align-items: center; gap: 8px;
}
.card-meta {
  flex: 1; min-width: 0;
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.card-meta-badge {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .04em; padding: 2px 6px; border-radius: 4px;
  background: #f0f0f0; color: var(--text-secondary); flex-shrink: 0;
}
.card-meta-dot { color: #ddd; font-size: 10px; }
.card-meta-author { font-size: 11px; color: var(--text-secondary); }
.card-meta-status {
  font-size: 10px; font-weight: 600; color: #f59e0b;
  background: #fffbeb; padding: 1px 5px; border-radius: 4px;
}
.card-likes {
  font-size: 11px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 3px; flex-shrink: 0;
}
.card-likes svg { opacity: .5; }

/* Action buttons — always visible */
.card-actions {
  display: flex; gap: 5px; flex-shrink: 0;
}
.card-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 7px;
  font-size: 11px; font-weight: 600; border: none;
  cursor: pointer; transition: background .12s; white-space: nowrap;
}
.card-btn-edit  { background: #f3f4f6; color: #374151; }
.card-btn-edit:hover { background: #e5e7eb; }
.card-btn-del   { background: #fee2e2; color: #b91c1c; }
.card-btn-del:hover { background: #fecaca; }

/* Prompt: 3-line clamp by default, expandable */
.card-prompt {
  font-size: 12.5px; color: #222; line-height: 1.6;
  word-break: break-word; white-space: pre-wrap;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
}
.card-prompt.expanded {
  display: block; -webkit-line-clamp: unset; overflow: visible;
}
.card-prompt.empty { color: #ccc; font-style: italic; display: block; }

/* Bottom row: expand toggle + source link */
.card-footer {
  display: flex; align-items: center; gap: 10px;
}
.prompt-toggle {
  font-size: 10.5px; color: #999; background: none; border: none;
  cursor: pointer; padding: 0; transition: color .12s; flex-shrink: 0;
}
.prompt-toggle:hover { color: #2563eb; }

.card-source {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10.5px; color: var(--text-secondary);
  text-decoration: none; transition: color .12s; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.card-source:hover { color: #2563eb; text-decoration: underline; }

/* ── Publish button (pending → gallery) ────────────── */
.card-btn-publish { background: #dbeafe; color: #1d4ed8; font-weight: 700; }
.card-btn-publish:hover { background: #bfdbfe; }
.card-btn-reject  { background: #fee2e2; color: #b91c1c; }
.card-btn-reject:hover  { background: #fecaca; }
.card-pending-badge {
  position: absolute; top: 7px; left: 7px;
  background: rgba(59,130,246,.88); color: #fff;
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 10px; pointer-events: none; z-index: 2; letter-spacing: .03em;
}
/* ── Approve button ─────────────────────────────────── */
.card-btn-approve {
  background: #dcfce7; color: #15803d; font-weight: 700;
}
.card-btn-approve:hover { background: #bbf7d0; }
.card-btn-revoke { background: #f3f4f6; color: #6b7280; }
.card-btn-revoke:hover { background: #e5e7eb; }

/* ── HQ (精选) button ───────────────────────────────── */
.card-btn-hq { background: #fef9c3; color: #92400e; }
.card-btn-hq:hover { background: #fef08a; }
.card-btn-hq.hq-on { background: #fde047; color: #713f12; font-weight: 800; }
.card-btn-hq.hq-on:hover { background: #facc15; }
.card-hq-badge {
  position: absolute; top: 7px; right: 38px;
  background: rgba(234,179,8,.92); color: #fff;
  font-size: 11px; font-weight: 800; padding: 1px 6px;
  border-radius: 10px; pointer-events: none; z-index: 2;
}

/* ── Quality score badge ────────────────────────────── */
.card-quality-badge {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 9px; font-weight: 800; padding: 2px 6px;
  border-radius: 4px; flex-shrink: 0;
}
.card-quality-badge.tier-excellent { background: #dcfce7; color: #15803d; }
.card-quality-badge.tier-good      { background: #dbeafe; color: #1d4ed8; }
.card-quality-badge.tier-average   { background: #f3f4f6; color: #4b5563; }
.card-quality-badge.tier-poor      { background: #fee2e2; color: #b91c1c; }

/* ── Score badge (admin boost) ───────────────────────── */
.card-score-badge {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 9px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .04em; padding: 2px 6px; border-radius: 4px;
  background: #e0e7ff; color: #3730a3; flex-shrink: 0;
}

/* ── Inline score stepper on card ───────────────────── */
.score-ctrl {
  display: inline-flex; align-items: center; gap: 2px; flex-shrink: 0;
}
.score-btn {
  width: 20px; height: 20px; border-radius: 5px;
  border: 1px solid #c7d2fe; background: #eef2ff; color: #4338ca;
  font-size: 14px; font-weight: 700; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .1s;
}
.score-btn:hover { background: #c7d2fe; }
.score-input {
  width: 36px; height: 20px; border-radius: 5px;
  border: 1px solid #c7d2fe; background: #eef2ff;
  color: #3730a3; font-size: 11px; font-weight: 700;
  text-align: center; outline: none; padding: 0;
  -moz-appearance: textfield;
}
.score-input::-webkit-inner-spin-button,
.score-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.score-input:focus { border-color: #6366f1; background: #fff; }

/* ── Score field in edit modal ──────────────────────── */
.fld-score-wrap {
  display: flex; align-items: center; gap: 8px;
}
.fld-score-wrap input[type=range] {
  flex: 1; accent-color: #4f46e5; cursor: pointer;
}
.fld-score-num {
  width: 38px; text-align: center;
  font-size: 13px; font-weight: 700; color: #4f46e5;
}
/* ── Tab bar ────────────────────────────────────────── */
#tab-bar {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex; align-items: center; gap: 0;
  position: sticky; top: var(--topbar-h); z-index: 90;
}
.tab-btn {
  padding: 10px 18px; font-size: 13px; font-weight: 500;
  border: none; background: none; cursor: pointer;
  color: var(--text-secondary); border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 7px; white-space: nowrap;
}
.tab-btn.active { color: var(--text-primary); border-bottom-color: #111; }
.tab-btn:hover:not(.active) { color: var(--text-primary); }
.tab-count {
  font-size: 11px; font-weight: 700;
  padding: 1px 7px; border-radius: 10px;
  background: #f0f0f0; color: var(--text-secondary);
  transition: background .15s, color .15s;
}
.tab-btn.active .tab-count { background: #111; color: #fff; }

/* ── Bulk actions ──────────────────────────────────── */
#bulk-bar {
  background: #fafafa; border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 10px;
  position: sticky; top: calc(var(--topbar-h) + 39px); z-index: 85;
}
.bulk-check {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: #444; white-space: nowrap;
}
.bulk-check input { width: 15px; height: 15px; accent-color: #111; cursor: pointer; }
#bulk-count { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.bulk-actions { display: flex; align-items: center; gap: 7px; margin-left: auto; }
.bulk-btn {
  padding: 5px 11px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.bulk-btn:disabled { opacity: .35; cursor: not-allowed; }
.bulk-btn-approve { background: #dcfce7; color: #15803d; }
.bulk-btn-delete { background: #fee2e2; color: #b91c1c; }
.bulk-btn-clear { background: #f3f4f6; color: #4b5563; }

/* ── Lightbox ───────────────────────────────────────── */
#lightbox {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.9); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: zoom-out;
}
#lightbox.hidden { display: none; }
#lightbox-img {
  max-width: 90vw; max-height: 90vh;
  object-fit: contain; border-radius: 6px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  cursor: default; display: block;
}
#lightbox-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(255,255,255,.12); border: none; color: #fff;
  width: 38px; height: 38px; border-radius: 50%; font-size: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s; line-height: 1;
}
#lightbox-close:hover { background: rgba(255,255,255,.25); }
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.12); border: none; color: #fff;
  width: 44px; height: 44px; border-radius: 50%; font-size: 26px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s; line-height: 1;
}
.lb-nav:hover { background: rgba(255,255,255,.25); }
#lb-prev { left: 20px; }
#lb-next { right: 20px; }
#lb-counter {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.6); font-size: 12px; pointer-events: none;
}
.card-img-wrap img { cursor: zoom-in; }

/* ── Modals (shared) ────────────────────────────────── */
.backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.backdrop.hidden { display: none; }
.modal-box {
  background: var(--card); border-radius: 18px;
  width: 100%; max-width: 980px; max-height: 92vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-hdr-title { font-size: 15px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f0f0f0; border: none; cursor: pointer;
  font-size: 17px; color: #555; display: flex;
  align-items: center; justify-content: center; line-height: 1;
}
.modal-close:hover { background: #e0e0e0; }

.modal-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }

/* Image panel */
.modal-imgs {
  width: 44%; flex-shrink: 0; background: #f7f7f7;
  border-right: 1px solid var(--border); overflow-y: auto;
  padding: 14px; display: flex; flex-direction: column; gap: 8px;
}
.modal-imgs img {
  width: 100%; border-radius: 10px; display: block;
  cursor: pointer; border: 2px solid transparent; transition: border-color .12s;
}
.modal-imgs img.active-thumb { border-color: #111; }

.thumb-strip {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 2px; flex-wrap: nowrap;
}
.thumb-strip img {
  width: 52px; height: 52px; object-fit: cover;
  border-radius: 6px; flex-shrink: 0;
}

/* Image replace section */
.img-replace-section {
  margin-top: 4px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.img-replace-btn {
  display: flex; align-items: center; gap: 6px;
  width: 100%; padding: 7px 12px;
  border: 1.5px dashed var(--border); border-radius: 9px;
  background: #fafafa; color: var(--text-secondary);
  font-size: 12px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: border-color .15s, background .15s;
  justify-content: center;
}
.img-replace-btn:hover {
  border-color: #999; background: #f0f0f0; color: var(--text-primary);
}
.img-replace-new { position: relative; margin-top: 8px; }
.img-replace-new img {
  width: 100%; border-radius: 8px; display: block;
  border: 2px solid #2563eb !important; cursor: default;
}
.img-new-badge {
  position: absolute; top: 7px; right: 7px;
  background: #2563eb; color: #fff; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 5px; letter-spacing: .04em;
}
.img-replace-hint {
  font-size: 10px; color: var(--text-secondary);
  text-align: center; margin-top: 5px;
}

/* Fields panel */
.modal-fields {
  flex: 1; overflow-y: auto; padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.fld { display: flex; flex-direction: column; gap: 5px; }
.fld-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--text-secondary);
}
.fld-input, .fld-select {
  border: 1px solid var(--border); border-radius: 9px;
  padding: 8px 11px; font-size: 13px; font-family: inherit;
  color: var(--text-primary); background: #fafafa; outline: none;
  transition: border-color .15s;
}
.fld-input:focus, .fld-select:focus { border-color: #999; background: #fff; }
.fld-textarea {
  border: 1px solid var(--border); border-radius: 9px;
  padding: 10px 11px; font-size: 12px; font-family: 'SF Mono','Fira Code',monospace;
  color: var(--text-primary); background: #fafafa; outline: none;
  min-height: 200px; resize: vertical; line-height: 1.65;
  transition: border-color .15s;
}
.fld-textarea:focus { border-color: #999; background: #fff; }
.char-count { font-size: 11px; color: var(--text-secondary); text-align: right; }

.modal-ftr {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0;
}
.btn-cancel {
  padding: 8px 18px; border-radius: 10px; border: none;
  background: #f0f0f0; color: #555; font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-apply {
  padding: 8px 18px; border-radius: 10px; border: none;
  background: #111; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-cancel:hover { background: #e5e5e5; }
.btn-apply:hover  { background: #333; }
.btn-apply:disabled { opacity: .45; cursor: not-allowed; }

/* ── Upload drop zone (Add modal) ───────────────────── */
.upload-zone {
  width: 100%; aspect-ratio: 4/3;
  border: 2px dashed var(--border); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 8px; cursor: pointer;
  transition: border-color .15s, background .15s;
  background: #fafafa; position: relative; overflow: hidden;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: #999; background: #f0f0f0; }
.upload-zone img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: contain; border-radius: 10px; border: none;
}
.upload-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-hint { font-size: 12px; color: var(--text-secondary); text-align: center; pointer-events: none; }
.upload-hint svg { display: block; margin: 0 auto 6px; opacity: .4; }

/* ── Delete confirm ─────────────────────────────────── */
.confirm-box {
  background: var(--card); border-radius: 14px;
  padding: 28px 24px; max-width: 380px; width: 100%; text-align: center;
}
.confirm-icon { font-size: 30px; margin-bottom: 10px; }
.confirm-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.confirm-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.btn-del { background: var(--accent) !important; }

/* ── Deploy panel ───────────────────────────────────── */
#deploy-panel {
  position: fixed; bottom: 0; left: 0; right: 0; height: 310px;
  background: #0d0d0d; border-top: 1px solid #2a2a2a; z-index: 150;
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
}
#deploy-panel.open { transform: translateY(0); }
.dp-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
}
.dp-title { font-size: 13px; font-weight: 600; color: #ddd; display: flex; align-items: center; gap: 7px; }
.dp-close { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 2px; }
.dp-close:hover { color: #aaa; }
#deploy-log {
  flex: 1; overflow-y: auto; padding: 10px 16px;
  font-family: 'SF Mono','Fira Code','Consolas',monospace;
  font-size: 12px; line-height: 1.7; color: #bbb; white-space: pre-wrap; word-break: break-all;
}
.log-ok   { color: #4ade80; }
.log-err  { color: #f87171; }
.log-dim  { color: #555; }
.log-note { color: #93c5fd; }

/* ── Toast ──────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #111; color: #fff; padding: 11px 18px;
  border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 500;
  transform: translateY(12px); opacity: 0;
  transition: transform .2s, opacity .2s; pointer-events: none;
}
#toast.on { transform: translateY(0); opacity: 1; }
#toast.err { background: #dc2626; }

/* ── Admin pagination ───────────────────────────────── */
.admin-pager {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; padding: 24px 0 8px; width: 100%;
}
.pager-btn {
  padding: 7px 18px; border-radius: 10px; border: 1px solid var(--border);
  background: #fff; color: var(--text-primary);
  font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s;
}
.pager-btn:hover:not(:disabled) { background: #f0f0f0; }
.pager-btn:disabled { opacity: .35; cursor: not-allowed; }
.pager-info { font-size: 13px; color: var(--text-secondary); }

/* ── Misc ───────────────────────────────────────────── */
.scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
.scrollbar-none::-webkit-scrollbar { display: none; }
.center-msg { text-align: center; padding: 80px 20px; color: var(--text-secondary); font-size: 14px; }
</style>
</head>

<script>
// ════════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════════
let allPrompts  = [];
let changes     = new Map();
let deletes     = new Set();
let newEntries  = [];
let filtered    = [];
let editId      = null;
let delId       = null;
let isBulkDel   = false;
let isDirty     = false;
let selectedIds = new Set();
let uploadedImg     = null;   // for add modal
let editUploadedImg = null;   // for edit modal image replacement
let editActiveIdx   = 0;      // which image index is currently selected in edit modal
let currentTab      = 'review';
let lightboxImgs    = [];
let lightboxIdx     = 0;
let qualityEntries  = {};     // id → {score, rawScore, tier}
let adminPage       = 0;
const ADMIN_PAGE_SIZE = 500;
// ════════════════════════════════════════════════════
//  Bootstrap
// ════════════════════════════════════════════════════
async function init() {
  try {
    const [pr, qr] = await Promise.all([
      fetch('/api/prompts'),
      fetch('/api/quality').catch(() => null),
    ]);
    if (!pr.ok) throw new Error(`HTTP ${pr.status}`);
    allPrompts = await pr.json();
    if (qr && qr.ok) {
      const qd = await qr.json();
      qualityEntries = qd.entries || {};
    }
    applyFilters();
    updateTabCounts();
    document.getElementById('msg').style.display = 'none';
    document.getElementById('grid').style.display = '';
  } catch(e) {
    document.getElementById('msg').textContent = '加载失败：' + e.message;
  }
}

// ════════════════════════════════════════════════════
//  Filter + Render
// ════════════════════════════════════════════════════
function applyFilters(resetPage = true) {
  const q    = (document.getElementById('search').value || '').toLowerCase();
  const cat  = document.getElementById('cat-filter').value;
  const lang = document.getElementById('lang-filter').value;
  const sort = document.getElementById('sort-select').value;
  const pool = [...newEntries, ...allPrompts];

  filtered = pool.filter(p => {
    if (deletes.has(p.id)) return false;
    const c = merged(p);
    if (currentTab === 'pending'  && c.pending !== true)                    return false;
    if (currentTab === 'review'   && (c.pending === true || c.approved === true)) return false;
    if (currentTab === 'approved' && (c.pending === true || c.approved !== true)) return false;
    if (cat  !== 'all' && c.category !== cat)  return false;
    if (lang !== 'all' && c.lang     !== lang) return false;
    if (q) {
      const hay = ((c.title||'')+' '+(c.prompt||'')+' '+(c.author||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'quality-desc') {
    filtered.sort((a, b) => (qualityEntries[b.id]?.score ?? -1) - (qualityEntries[a.id]?.score ?? -1));
  } else if (sort === 'quality-asc') {
    filtered.sort((a, b) => (qualityEntries[a.id]?.score ?? 101) - (qualityEntries[b.id]?.score ?? 101));
  } else if (sort === 'score-desc') {
    filtered.sort((a, b) => (merged(b).score || 0) - (merged(a).score || 0));
  } else if (sort === 'likes-desc') {
    filtered.sort((a, b) => (merged(b).stats?.likes || 0) - (merged(a).stats?.likes || 0));
  }

  // Manual score > 0 always pins to top regardless of sort mode (mirrors gallery frontend)
  if (sort !== 'score-desc') {
    const pinned   = filtered.filter(p => (merged(p).score || 0) > 0)
                             .sort((a, b) => (merged(b).score || 0) - (merged(a).score || 0));
    const unpinned = filtered.filter(p => !((merged(p).score || 0) > 0));
    filtered = [...pinned, ...unpinned];
  }

  const total = pool.length - deletes.size;
  document.getElementById('count-label').textContent =
    filtered.length === total ? `${total.toLocaleString()} 个`
    : `${filtered.length} / ${total} 个`;

  updateTabCounts();
  syncSelection();
  if (resetPage) adminPage = 0;
  renderGrid();
  updateBulkControls();
}

function goAdminPage(delta) {
  const maxPage = Math.ceil(filtered.length / ADMIN_PAGE_SIZE) - 1;
  adminPage = Math.max(0, Math.min(maxPage, adminPage + delta));
  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function merged(p) {
  return changes.has(p.id) ? { ...p, ...changes.get(p.id) } : p;
}

function imgSrc(entry) {
  return entry.thumbnail || (entry.outputImages && entry.outputImages[0]) || '';
}

function isNew(p) { return newEntries.some(n => n.id === p.id); }

function togglePrompt(id, btn) {
  const el = document.getElementById('prompt-' + id);
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '收起 ▲' : '展开 ▼';
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="center-msg" style="column-span:all">没有找到匹配的提示词</div>';
    return;
  }

  const totalPages = Math.ceil(filtered.length / ADMIN_PAGE_SIZE);
  const pageSlice  = filtered.slice(adminPage * ADMIN_PAGE_SIZE, (adminPage + 1) * ADMIN_PAGE_SIZE);

  const pagerHtml = totalPages > 1 ? `
    <div class="admin-pager">
      <button class="pager-btn" onclick="goAdminPage(-1)" ${adminPage === 0 ? 'disabled' : ''}>← 上一页</button>
      <span class="pager-info">第 ${adminPage + 1} / ${totalPages} 页 &nbsp;·&nbsp; 共 ${filtered.length.toLocaleString()} 条</span>
      <button class="pager-btn" onclick="goAdminPage(1)" ${adminPage >= totalPages - 1 ? 'disabled' : ''}>下一页 →</button>
    </div>` : '';

  grid.innerHTML = pageSlice.map(p => {
    const c      = merged(p);
    const mod    = changes.has(p.id);
    const nw     = isNew(p);
    const src    = imgSrc(c);
    const prompt = (c.prompt || '').trim();
    const srcLabel = c.sourceUrl
      ? c.sourceUrl.replace(/^https?:\/\/(www\.)?/, '').slice(0, 55)
      : '';
    const likes = c.stats?.likes || c.likes || 0;
    const likesStr = likes >= 1000 ? (likes/1000).toFixed(1)+'K' : likes > 0 ? String(likes) : '';
    const qe = qualityEntries[p.id];
    const qualityBadge = qe
      ? `<span class="card-quality-badge tier-${qe.tier}" title="Raw: ${qe.rawScore}">Q ${qe.score}</span>`
      : '';

    return `<div class="mitem">
      <div class="card${selectedIds.has(p.id) ? ' selected' : ''}" data-id="${esc(p.id)}">
        <label class="card-select" title="选择">
          <input type="checkbox" ${selectedIds.has(p.id) ? 'checked' : ''}
            onchange="toggleSelect('${esc(p.id)}', this.checked)" onclick="event.stopPropagation()">
        </label>

        <!-- Image -->
        <div class="card-img-wrap">
          ${mod ? '<span class="card-badge mod">✎</span>' : ''}
          ${nw  ? '<span class="card-badge new">+</span>'  : ''}
          ${isHQ(p) ? '<span class="card-hq-badge">★</span>' : ''}
          ${isPending(p) ? '<span class="card-pending-badge">待发布</span>' : ''}
          ${src
            ? `<img src="${esc(src)}" alt="" loading="lazy" onerror="this.style.display='none'" onclick="openLightbox('${esc(p.id)}')">`
            : '<div class="card-no-img">无图片</div>'}
        </div>

        <!-- Content -->
        <div class="card-body">

          <!-- Meta + likes + actions -->
          <div class="card-top">
            <div class="card-meta">
              <span class="card-meta-badge">${esc(c.category)}</span>
              <span class="card-meta-dot">·</span>
              <span class="card-meta-author">@${esc(c.author)}</span>
              <span class="card-meta-dot">·</span>
              <span class="card-meta-author">${esc((c.lang||'').toUpperCase())}</span>
              ${qualityBadge}
              <span class="score-ctrl" title="置顶权重 (0=正常, 1–100=置顶)" onclick="event.stopPropagation()">
                <button class="score-btn" onclick="adjustScore('${esc(p.id)}',-10)">−</button>
                <input class="score-input" type="number" min="0" max="100"
                  value="${c.score||0}"
                  onchange="setScore('${esc(p.id)}',+this.value)"
                  onclick="this.select()">
                <button class="score-btn" onclick="adjustScore('${esc(p.id)}',+10)">+</button>
              </span>
              ${mod ? '<span class="card-meta-status">edited</span>' : ''}
              ${nw  ? '<span class="card-meta-status" style="color:#2563eb;background:#eff6ff">new</span>' : ''}
            </div>
            ${likesStr ? `<span class="card-likes">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              ${esc(likesStr)}
            </span>` : ''}
            <div class="card-actions">
              <button class="card-btn card-btn-edit" onclick="openEdit('${esc(p.id)}')">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>编辑
              </button>
              ${currentTab === 'pending' ? `
              <button class="card-btn card-btn-reject" onclick="openDel('${esc(p.id)}')">拒绝</button>
              <button class="card-btn card-btn-publish" onclick="publishEntry('${esc(p.id)}')">✓ 发布</button>
              ` : `
              <button class="card-btn card-btn-del" onclick="openDel('${esc(p.id)}')">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
                  <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>删除
              </button>
              ${isApproved(p)
                ? `<button class="card-btn card-btn-revoke" onclick="revokeApproval('${esc(p.id)}')">撤销</button>`
                : `<button class="card-btn card-btn-approve" onclick="approveEntry('${esc(p.id)}')">✓ 通过</button>`
              }
              <button class="card-btn card-btn-hq${isHQ(p) ? ' hq-on' : ''}" onclick="toggleHQ('${esc(p.id)}')">
                ${isHQ(p) ? '★ 精选' : '☆ 精选'}
              </button>
              `}
            </div>
          </div>

          <!-- Prompt: 3-line clamp -->
          <div class="card-prompt${prompt ? '' : ' empty'}" id="prompt-${esc(p.id)}">${prompt ? esc(prompt) : '无提示词'}</div>

          <!-- Footer: expand toggle + source -->
          <div class="card-footer">
            ${prompt.length > 120
              ? `<button class="prompt-toggle" onclick="togglePrompt('${esc(p.id)}',this)">展开 ▼</button>`
              : ''}
            ${srcLabel
              ? `<a class="card-source" href="${esc(c.sourceUrl)}" target="_blank" rel="noopener">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>
                  </svg>${esc(srcLabel)}
                </a>`
              : ''}
          </div>

        </div>
      </div>
    </div>`;
  }).join('') + pagerHtml;
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ════════════════════════════════════════════════════
//  Selection / Bulk actions
// ════════════════════════════════════════════════════
function visibleIds() {
  return filtered.map(p => p.id);
}

function syncSelection() {
  const poolIds = new Set([...newEntries, ...allPrompts].map(p => p.id));
  selectedIds = new Set([...selectedIds].filter(id => poolIds.has(id) && !deletes.has(id)));
}

function updateBulkControls() {
  const ids = visibleIds();
  const selectedVisible = ids.filter(id => selectedIds.has(id));
  const selectedCount = selectedIds.size;
  const allVisibleSelected = ids.length > 0 && selectedVisible.length === ids.length;
  const someVisibleSelected = selectedVisible.length > 0 && selectedVisible.length < ids.length;
  const selectAll = document.getElementById('select-all-visible');

  selectAll.checked = allVisibleSelected;
  selectAll.indeterminate = someVisibleSelected;
  document.getElementById('bulk-count').textContent = `已选择 ${selectedCount} 项`;
  document.getElementById('bulk-approve-btn').disabled = selectedCount === 0;
  document.getElementById('bulk-delete-btn').disabled = selectedCount === 0;
  document.getElementById('bulk-clear-btn').disabled = selectedCount === 0;
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else selectedIds.delete(id);
  renderGrid();
  updateBulkControls();
}

function setAllVisibleSelected(checked) {
  visibleIds().forEach(id => {
    if (checked) selectedIds.add(id);
    else selectedIds.delete(id);
  });
  renderGrid();
  updateBulkControls();
}

function toggleAllVisible() {
  const ids = visibleIds();
  if (ids.length === 0) return;
  const shouldSelect = ids.some(id => !selectedIds.has(id));
  setAllVisibleSelected(shouldSelect);
}

function clearSelection() {
  selectedIds.clear();
  renderGrid();
  updateBulkControls();
}

async function approveSelected() {
  const ids = [...selectedIds];
  if (ids.length === 0) return;

  const btn = document.getElementById('bulk-approve-btn');
  btn.disabled = true;
  btn.textContent = '通过中…';

  ids.forEach(id => {
    const existing = changes.get(id) || {};
    changes.set(id, { ...existing, approved: true, pending: false });
  });
  markDirty();

  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    selectedIds.clear();
    toast(`✓ 已通过 ${ids.length} 项`);
  } catch(e) {
    toast('批量通过失败：' + e.message, true);
  } finally {
    btn.textContent = '通过';
    applyFilters(false);
  }
}

function openBulkDel() {
  if (selectedIds.size === 0) return;
  isBulkDel = true;
  delId = null;
  document.getElementById('del-desc').textContent =
    `将删除已选择的 ${selectedIds.size} 项，点击"保存"后生效。`;
  document.getElementById('del-modal').classList.remove('hidden');
}

// ════════════════════════════════════════════════════
//  Edit modal
// ════════════════════════════════════════════════════
function openEdit(id) {
  const pool = [...newEntries, ...allPrompts];
  const p = pool.find(p => p.id === id);
  if (!p) return;
  const c = merged(p);
  editId = id;

  // Reset image replace state
  editUploadedImg = null;
  editActiveIdx   = 0;
  document.getElementById('ei-replace-input').value = '';
  document.getElementById('ei-replace-new').style.display   = 'none';
  document.getElementById('ei-replace-hint').style.display  = 'none';

  // Fill fields
  document.getElementById('ei-title').value  = c.title    || '';
  document.getElementById('ei-cat').value    = c.category || 'other';
  document.getElementById('ei-author').value = c.author   || '';
  document.getElementById('ei-prompt').value = c.prompt   || '';
  document.getElementById('ei-charcount').textContent = (c.prompt||'').length + ' 字符';
  const scoreVal = Math.min(100, Math.max(0, parseInt(c.score) || 0));
  document.getElementById('ei-score').value    = scoreVal;
  document.getElementById('ei-score-num').textContent = scoreVal;

  // Images
  const imgs = c.outputImages || (c.thumbnail ? [c.thumbnail] : []);
  const main  = document.getElementById('ei-main');
  main.src = imgs[0] || '';
  main.style.display = imgs[0] ? '' : 'none';
  main.className = 'active-thumb';

  const strip = document.getElementById('ei-thumbs');
  strip.innerHTML = imgs.length > 1
    ? imgs.map((url, i) =>
        `<img src="${esc(url)}" loading="lazy"
          class="${i===0?'active-thumb':''}"
          onclick="selectThumb(this,'${esc(url)}',${i})"
          onerror="this.style.display='none'">`
      ).join('')
    : '';

  document.getElementById('edit-modal').classList.remove('hidden');
  document.getElementById('ei-title').focus();
}

function selectThumb(el, url, idx) {
  editActiveIdx = idx;
  // Cancel any pending replacement when switching images
  editUploadedImg = null;
  document.getElementById('ei-replace-new').style.display  = 'none';
  document.getElementById('ei-replace-hint').style.display = 'none';
  document.getElementById('ei-replace-input').value = '';

  document.getElementById('ei-main').src = url;
  document.querySelectorAll('#ei-thumbs img').forEach(i => i.classList.remove('active-thumb'));
  el.classList.add('active-thumb');
}

function editUploadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    editUploadedImg = { filename: file.name, dataUrl };

    // Show preview in replace section
    document.getElementById('ei-replace-preview').src = dataUrl;
    document.getElementById('ei-replace-new').style.display  = '';
    document.getElementById('ei-replace-hint').style.display = '';

    // Also update main image preview immediately
    document.getElementById('ei-main').src = dataUrl;
  };
  reader.readAsDataURL(file);
}

function closeEdit() {
  editId = null;
  editUploadedImg = null;
  document.getElementById('edit-modal').classList.add('hidden');
}

async function applyEdit() {
  if (!editId) return;

  const btn = document.getElementById('ei-apply-btn');
  btn.disabled = true;
  btn.textContent = '处理中…';

  try {
    let imagePath = null;

    // Upload replacement image if one was selected
    if (editUploadedImg) {
      const ext      = editUploadedImg.filename.split('.').pop() || 'jpg';
      const filename = `${editId}_${editActiveIdx}.${ext}`;

      const r = await fetch('/api/upload', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ filename, data: editUploadedImg.dataUrl }),
      });
      const res = await r.json();
      if (!r.ok || !res.ok) throw new Error(res.error || '图片上传失败');
      imagePath = res.path;
    }

    const upd = {
      title:    document.getElementById('ei-title').value.trim(),
      category: document.getElementById('ei-cat').value,
      author:   document.getElementById('ei-author').value.trim(),
      prompt:   document.getElementById('ei-prompt').value,
      score:    Math.min(100, Math.max(0, parseInt(document.getElementById('ei-score').value) || 0)),
    };

    if (imagePath) {
      // Update the specific image at editActiveIdx
      const pool = [...newEntries, ...allPrompts];
      const p = pool.find(p => p.id === editId);
      const c = merged(p);
      const imgs = [...(c.outputImages || (c.thumbnail ? [c.thumbnail] : []))];
      imgs[editActiveIdx] = imagePath;
      upd.outputImages = imgs;
      if (editActiveIdx === 0) upd.thumbnail = imagePath;
    }

    changes.set(editId, upd);
    editUploadedImg = null;
    closeEdit();
    markDirty();
    applyFilters(false);
    toast(imagePath ? '✓ 图片已替换，修改已暂存' : '修改已暂存，点击"保存"写入文件');
  } catch(e) {
    toast('操作失败：' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '应用修改';
  }
}

// ════════════════════════════════════════════════════
//  Add Entry modal
// ════════════════════════════════════════════════════
function openAdd() {
  uploadedImg = null;
  document.getElementById('upload-input').value = '';
  document.getElementById('add-preview-img').src = '';
  document.getElementById('add-img-preview').style.display = 'none';
  document.getElementById('upload-zone').querySelector('.upload-hint').style.display = '';
  document.getElementById('add-title').value  = '';
  document.getElementById('add-author').value = '';
  document.getElementById('add-source').value = '';
  document.getElementById('add-prompt').value = '';
  document.getElementById('add-charcount').textContent = '0 字符';
  document.getElementById('add-cat').value  = 'other';
  document.getElementById('add-lang').value = 'zh';
  document.getElementById('add-modal').classList.remove('hidden');
  document.getElementById('add-title').focus();
}

function closeAdd() {
  document.getElementById('add-modal').classList.add('hidden');
}

function uploadDragOver(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.add('drag-over');
}
function uploadDragLeave() {
  document.getElementById('upload-zone').classList.remove('drag-over');
}
function uploadDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
}
function uploadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    uploadedImg = { filename: file.name, dataUrl };
    document.getElementById('add-preview-img').src = dataUrl;
    document.getElementById('add-img-preview').style.display = '';
    document.getElementById('upload-zone').querySelector('.upload-hint').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function submitAdd() {
  const title  = document.getElementById('add-title').value.trim();
  const prompt = document.getElementById('add-prompt').value.trim();
  if (!title)  { toast('请填写标题', true); return; }
  if (!prompt) { toast('请填写提示词', true); return; }

  const btn = document.getElementById('add-submit-btn');
  btn.disabled = true;
  btn.textContent = '处理中…';

  try {
    let imagePath = '';
    if (uploadedImg) {
      const ext      = uploadedImg.filename.split('.').pop() || 'jpg';
      const newId    = Date.now().toString();
      const filename = `${newId}_0.${ext}`;
      const r = await fetch('/api/upload', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ filename, data: uploadedImg.dataUrl }),
      });
      const res = await r.json();
      if (!r.ok || !res.ok) throw new Error(res.error || 'Upload failed');
      imagePath = res.path;
    }

    const id       = Date.now().toString();
    const lang     = document.getElementById('add-lang').value;
    const category = document.getElementById('add-cat').value;
    const author   = document.getElementById('add-author').value.trim() || 'unknown';
    const source   = document.getElementById('add-source').value.trim();

    const entry = {
      id, title,
      thumbnail:       imagePath,
      thumbnailAspect: 1,
      author,
      authorUrl:       source,
      tags:            [lang, category],
      category, lang,
      stats:           { likes: 0, retweets: 0, views: 0 },
      createdAt:       new Date().toUTCString(),
      prompt,
      outputImages:    imagePath ? [imagePath] : [],
      sourceUrl:       source,
    };

    newEntries.unshift(entry);
    closeAdd();
    markDirty();
    applyFilters(false);
    toast('✦ 已添加，点击"保存"写入文件');
  } catch(e) {
    toast('添加失败：' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '添加到列表';
  }
}

// ════════════════════════════════════════════════════
//  Delete
// ════════════════════════════════════════════════════
function openDel(id) {
  isBulkDel = false;
  delId = id;
  const pool = [...newEntries, ...allPrompts];
  const p = pool.find(p => p.id === id);
  const c = p ? merged(p) : {};
  document.getElementById('del-desc').textContent =
    `将删除「${c.title || id}」，点击"保存"后生效。`;
  document.getElementById('del-modal').classList.remove('hidden');
}

function closeDel() {
  delId = null;
  isBulkDel = false;
  document.getElementById('del-modal').classList.add('hidden');
}

function confirmDel() {
  const ids = isBulkDel ? [...selectedIds] : (delId ? [delId] : []);
  if (ids.length === 0) return;

  ids.forEach(id => {
    const newIdx = newEntries.findIndex(n => n.id === id);
    if (newIdx !== -1) {
      newEntries.splice(newIdx, 1);
    } else {
      deletes.add(id);
    }
    changes.delete(id);
    selectedIds.delete(id);
  });

  closeDel();
  markDirty();
  applyFilters(false);
  toast(ids.length > 1 ? `已标记删除 ${ids.length} 项，点击"保存"写入文件` : '已标记删除，点击"保存"写入文件');
}

// ════════════════════════════════════════════════════
//  Dirty state
// ════════════════════════════════════════════════════
function markDirty()  { isDirty = true;  document.getElementById('dirty-dot').classList.add('on'); }
function clearDirty() { isDirty = false; document.getElementById('dirty-dot').classList.remove('on'); }

// ════════════════════════════════════════════════════
//  Tab / Approve
// ════════════════════════════════════════════════════
function isPending(p) {
  const c = merged(p);
  return c.pending === true;
}

function isApproved(p) {
  const c = merged(p);
  return c.approved === true;
}

function isHQ(p) {
  const c = merged(p);
  return c.hq === true;
}

async function setScore(id, val) {
  const score = Math.min(100, Math.max(0, Math.round(val) || 0));
  const existing = changes.get(id) || {};
  changes.set(id, { ...existing, score });
  markDirty();
  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    toast(score > 0 ? `⬆ Score set to ${score}` : 'Score cleared');
  } catch(e) {
    toast('保存失败：' + e.message, true);
  }
  applyFilters(false);
}

function adjustScore(id, delta) {
  const pool = [...newEntries, ...allPrompts];
  const p = pool.find(q => q.id === id);
  if (!p) return;
  const current = parseInt(merged(p).score) || 0;
  setScore(id, current + delta);
}

async function toggleHQ(id) {
  const pool = [...newEntries, ...allPrompts];
  const p = pool.find(q => q.id === id);
  if (!p) return;
  const wasHQ = isHQ(p);
  const existing = changes.get(id) || {};
  changes.set(id, { ...existing, hq: !wasHQ });
  markDirty();
  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    toast(wasHQ ? '已取消精选' : '★ 已标记为精选');
  } catch(e) {
    toast('保存失败：' + e.message, true);
  }
  applyFilters(false);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  applyFilters();
}

function updateTabCounts() {
  const pool = [...newEntries, ...allPrompts].filter(p => !deletes.has(p.id));
  document.getElementById('count-pending').textContent  = pool.filter(p =>  isPending(p)).length;
  document.getElementById('count-review').textContent   = pool.filter(p => !isPending(p) && !isApproved(p)).length;
  document.getElementById('count-approved').textContent = pool.filter(p => !isPending(p) &&  isApproved(p)).length;
}

async function publishEntry(id) {
  const existing = changes.get(id) || {};
  changes.set(id, { ...existing, pending: false });
  markDirty();
  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    toast('✓ 已发布到图库');
  } catch(e) {
    toast('发布失败：' + e.message, true);
  }
  applyFilters(false);
}

async function approveEntry(id) {
  const existing = changes.get(id) || {};
  changes.set(id, { ...existing, approved: true });
  markDirty();
  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    toast('✓ 已通过审核');
  } catch(e) {
    toast('保存失败：' + e.message, true);
  }
  applyFilters(false);
}

async function revokeApproval(id) {
  const existing = changes.get(id) || {};
  changes.set(id, { ...existing, approved: false });
  markDirty();
  try {
    const out = await saveData();
    allPrompts = out; newEntries = []; changes.clear(); deletes.clear(); clearDirty();
    toast('已撤销通过');
  } catch(e) {
    toast('保存失败：' + e.message, true);
  }
  applyFilters(false);
}

// ════════════════════════════════════════════════════
//  Lightbox
// ════════════════════════════════════════════════════
function openLightbox(entryId) {
  const pool = [...newEntries, ...allPrompts];
  const p = pool.find(p => p.id === entryId);
  if (!p) return;
  const c = merged(p);
  lightboxImgs = (c.outputImages && c.outputImages.length) ? c.outputImages : (c.thumbnail ? [c.thumbnail] : []);
  if (lightboxImgs.length === 0) return;
  lightboxIdx = 0;
  showLightboxImg();
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function showLightboxImg() {
  document.getElementById('lightbox-img').src = lightboxImgs[lightboxIdx];
  const counter = document.getElementById('lb-counter');
  if (lightboxImgs.length > 1) {
    counter.textContent = `${lightboxIdx + 1} / ${lightboxImgs.length}`;
    document.getElementById('lb-prev').style.display = lightboxIdx > 0 ? '' : 'none';
    document.getElementById('lb-next').style.display = lightboxIdx < lightboxImgs.length - 1 ? '' : 'none';
  } else {
    counter.textContent = '';
    document.getElementById('lb-prev').style.display = 'none';
    document.getElementById('lb-next').style.display = 'none';
  }
}

function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  lightboxIdx = Math.max(0, Math.min(lightboxImgs.length - 1, lightboxIdx + dir));
  showLightboxImg();
}

// ════════════════════════════════════════════════════
//  Save
// ════════════════════════════════════════════════════
async function saveData() {
  const pool = [...newEntries, ...allPrompts];
  const out = pool
    .filter(p => !deletes.has(p.id))
    .map(p => {
      const c = changes.has(p.id) ? { ...p, ...changes.get(p.id) } : p;
      const baseTags = (c.tags || []).filter(t => t !== c.category && t !== p.category);
      c.tags = [...new Set([c.lang, c.category, ...baseTags])];
      return c;
    });

  const r = await fetch('/api/prompts', {
    method:  'PUT',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(out),
  });
  if (!r.ok) throw new Error(await r.text());
  return out;
}

async function doSave() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '保存中…';

  try {
    const out = await saveData();
    allPrompts = out;
    newEntries = [];
    changes.clear();
    deletes.clear();
    selectedIds.clear();
    clearDirty();
    applyFilters(false);
    toast(`✓ 已保存 ${out.length} 条记录`);
  } catch(e) {
    toast('保存失败：' + e.message, true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>保存`;
  }
}

// ════════════════════════════════════════════════════
//  Deploy
// ════════════════════════════════════════════════════
async function doDeploy() {
  await doSave();

  const panel = document.getElementById('deploy-panel');
  const log   = document.getElementById('deploy-log');
  const title = document.getElementById('dp-title-text');
  const btn   = document.getElementById('deploy-btn');

  log.innerHTML = '';
  panel.classList.add('open');
  title.textContent = '部署至 Vercel…';
  btn.disabled = true;

  const append = (text, cls) => {
    const span = document.createElement('span');
    span.textContent = text;
    if (cls) span.className = cls;
    log.appendChild(span);
    log.scrollTop = log.scrollHeight;
  };

  try {
    const status = await fetch('/api/deploy/status', { cache: 'no-store' });
    if (!status.ok) {
      throw new Error('Admin server is outdated. Restart it with npm run admin, then reload this page.');
    }

    const es = new EventSource('/api/deploy/vercel');

    es.addEventListener('log', e => {
      const { text } = JSON.parse(e.data);
      append(text);
    });

    es.addEventListener('done', e => {
      const { ok, error, note } = JSON.parse(e.data);
      es.close();
      btn.disabled = false;
      if (ok) {
        title.textContent = '✓ Vercel 部署完成';
        append('\n✓ 部署成功！\n', 'log-ok');
        if (note) append(note + '\n', 'log-note');
        toast('✓ 已推送至 Vercel');
      } else {
        title.textContent = '✗ 部署失败';
        append('\n✗ ' + (error || '部署失败') + '\n', 'log-err');
        toast('部署失败，查看日志', true);
      }
    });

    es.onerror = () => {
      es.close();
      btn.disabled = false;
      title.textContent = '✗ 连接中断';
      append('\n✗ 与服务器的连接中断\n', 'log-err');
    };
  } catch(e) {
    btn.disabled = false;
    toast('部署启动失败：' + e.message, true);
  }
}

function closeDeployPanel() {
  document.getElementById('deploy-panel').classList.remove('open');
}

// ════════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════════
function backdropClose(e, id, fn) {
  if (e.target === document.getElementById(id)) fn();
}

let _toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('err', isErr);
  el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('on'), 3000);
}

// ════════════════════════════════════════════════════
//  Keyboard shortcuts
// ════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!document.getElementById('lightbox').classList.contains('hidden')) { closeLightbox(); return; }
    closeEdit(); closeDel(); closeAdd();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    doSave();
  }
});

window.addEventListener('beforeunload', e => {
  if (isDirty) { e.preventDefault(); e.returnValue = ''; }
});

init();
</script>
